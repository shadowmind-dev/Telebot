<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Buttons Demo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #17212b; /* Telegram Dark Theme Background */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .heading {
            color: white;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }
        /* Buttons ki styling aur solid colors */
        .btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .blue { background-color: #2481cc; }
        .green { background-color: #2ec44e; }
        .red { background-color: #e53935; }
        /* Yellow par text black achha lagega visibility ke liye */
        .yellow { background-color: #fdd835; color: #000; } 
    </style>
</head>
<body>

    <div class="heading">Mera Colorful Menu 🚀</div>

    <div class="grid-container">
        <button class="btn blue" onclick="buttonClicked('Blue')">Demo Blue</button>
        <button class="btn green" onclick="buttonClicked('Green')">Demo Green</button>
        <button class="btn red" onclick="buttonClicked('Red')">Demo Red</button>
        <button class="btn yellow" onclick="buttonClicked('Yellow')">Demo Yellow</button>
    </div>

    <script>
        // Telegram Web App ko initialize karna
        const tg = window.Telegram.WebApp;
        tg.expand(); // Isse app poori screen par khul jayegi

        function buttonClicked(color) {
            // Jab button par click hoga, to Telegram ke andar hi ek popup aayega
            tg.showPopup({
                title: 'Button Working!',
                message: `Tumne ${color} button par click kiya hai aur ye bina message send kiye chal rha h!`,
                buttons: [{type: 'ok'}]
            });
        }
    </script>
</body>
</html>
